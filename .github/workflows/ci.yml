name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      run_integration_examples:
        description: 'Build and run mock integration examples (no native model execution)'
        required: false
        default: 'false'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.15.x'

    - name: Configure unit tests
      run: cmake -S tests -B tests/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build unit tests
      run: cmake --build tests/build --config ${{ matrix.build_type }}

    - name: Run unit tests
      run: ctest --test-dir tests/build -C ${{ matrix.build_type }} --output-on-failure

  integration-examples:
    name: Mock Integration Examples
    runs-on: ubuntu-latest
    if: github.event.inputs.run_integration_examples == 'true' || contains(github.event.head_commit.message, '[test:integration-examples]')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2

    - name: Note about integration example scope
      run: |
        echo "These examples exercise the integration harness with mock generation."
        echo "They do not perform native stable-diffusion.cpp model execution."

    - name: Configure integration tests
      run: |
        cmake -S tests/integration -B tests/integration/build

    - name: Build integration tests
      run: |
        cmake --build tests/integration/build --config Release

    - name: Run integration examples
      run: |
        ctest --test-dir tests/integration/build -C Release --output-on-failure

  lint:
    name: Code Formatting Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check file formatting
      run: |
        echo "Checking for common formatting issues..."
        # Check for tabs vs spaces consistency
        if git grep -l "    " src/ | grep -E '\.(cpp|h)$'; then
          echo "Warning: Found files with spaces instead of tabs"
        fi
        # Check for trailing whitespace
        if git grep -l ' $' src/ | grep -E '\.(cpp|h)$'; then
          echo "Warning: Found trailing whitespace"
        fi
        echo "Basic checks complete"

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Doxygen
      run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

    - name: Generate documentation
      run: |
        doxygen Doxyfile
        echo "Documentation generated successfully"

    - name: Check for warnings
      run: |
        if [ -f docs/api/warnings.log ]; then
          cat docs/api/warnings.log
          if [ -s docs/api/warnings.log ]; then
            echo "Doxygen warnings found"
            exit 1
          fi
        fi

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, lint, documentation]
    if: always()

    steps:
    - name: Check results
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Unit tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Linting: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Documentation: ${{ needs.documentation.result }}" >> $GITHUB_STEP_SUMMARY
